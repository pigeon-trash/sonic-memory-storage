<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Open Graph -->
    <meta property="og:title" content="Sonic Memory Storage" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://sonic-memory-storage.glitch.me" />
    <meta
      property="og:description"
      content="A digital shrine for audio and visual memories"
    />

    <title>sonic memory storage</title>

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/gif"
      href="https://raw.githubusercontent.com/mojabasura/sonic-memory-storage/main/images/favicon.gif"
    />
    <link
      rel="shortcut icon"
      type="image/gif"
      href="https://raw.githubusercontent.com/mojabasura/sonic-memory-storage/main/images/favicon.gif"
    />

    <!-- STYLES -->
    <style>
      body {
        width: 6000px;
        height: 4000px;
        margin: 0;
        background-image: url("https://raw.githubusercontent.com/mojabasura/sonic-memory-storage/main/images/moss.gif");
        background-repeat: repeat;
      }

      img {
        width: 600px;
        position: absolute;
      }

      h3 {
        font-family: "Times New Roman";
        background-color: yellow;
        color: red;
      }

      .header {
        color: lavender;
        font-family: Arial;
        background-color: magenta;
      }

      .text {
        color: lime;
        font-family: "Arial Narrow";
        background-color: blue;
      }

      marquee {
        font-size: 150px;
        color: yellow;
        font-family: cursive;
        line-height: 300px;
        position: absolute;
      }

      @keyframes rotateImage {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .rotating {
        animation: rotateImage 5s linear infinite;
        width: 200px;
      }

      #triggeredImage {
        display: none;
        position: absolute;
        width: 500px;
        top: 3500px;
        left: 4500px;
      }

      button {
        font-size: 18px;
        color: white;
        background-color: blue;
        font-family: "Arial Narrow";
        border: none;
        cursor: pointer;
        position: absolute;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>

  <body>
    <!-- TYPOGRAPHY -->
    <div style="z-index: 10">
      <h1 class="header" style="position: absolute; top: 100px; left: 200px">
        the sweetest moments are fleeting and remind me of life's temporality
      </h1>

      <h2 class="text" style="position: absolute; top: 1000px; left: 1000px">
        there i was remembering to savor every sound
      </h2>

      <!-- Rotating image -->
      <img
        class="rotating"
        style="top: 3500px; left: 1000px"
        src="https://raw.githubusercontent.com/mojabasura/sonic-memory-storage/main/images/baby-mo.jpg"
      />

      <!-- Marquee -->
      <marquee style="top: 450px; width: 6000px" direction="right" scrollamount="15">
        Tenderness awaits
      </marquee>
    </div>

    <!-- Button -->
    <button onclick="showImage()" style="top: 3500px; left: 4500px">
      Press Me
    </button>

    <!-- Triggered Image -->
    <img
      id="triggeredImage"
      src="https://cdn.glitch.global/6b1151d8-1caa-488a-ac35-fcfba75da26c/ascii-portrait.png?v=1729191471306"
      alt="ASCII Portrait"
    />

    <!-- SCRIPT -->
    <script>
      function showImage() {
        document.getElementById("triggeredImage").style.display = "block";
      }
    </script>
  </body>
</html>
